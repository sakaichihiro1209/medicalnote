<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Medical Knowledge Manager</title>
    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
    </style>
</head>
<body>
    <header>
        <div class="header-title">
            <span class="material-symbols-outlined">local_hospital</span>
            MKM
        </div>
        
        <!-- PC/タブレット用メニュー -->
        <div class="nav-buttons" id="pc-nav-buttons">
            <!-- Google Drive 連携ボタン -->
            {% if google_connected %}
                <span style="font-size: 0.85rem; color: var(--color-success); font-weight: 600; display: inline-flex; align-items: center; gap: 0.25rem;">
                    <span class="material-symbols-outlined">check_circle</span> 連携中
                </span>
                <a href="{{ url_for('google_logout') }}" class="btn btn-secondary" style="padding: 0.35rem 0.75rem; min-height: auto; font-size: 0.8rem;">切断</a>
            {% else %}
                <a href="{{ url_for('google_login') }}" class="btn btn-primary" style="background-color: #4285F4; border-color: #4285F4;">
                    Google 連携
                </a>
            {% endif %}

            <button class="btn btn-secondary" onclick="openGoogleSettingsModal()" style="padding: 0.4rem; min-height: 38px; width: 38px;" title="Google ドライブ接続設定">
                <span class="material-symbols-outlined">settings</span>
            </button>

            <button class="btn btn-secondary" hx-post="{{ url_for('rebuild_cache') }}" hx-target="body">
                <span class="material-symbols-outlined">sync</span> 再スキャン
            </button>
            <button class="btn btn-secondary" onclick="toggleInbox()">
                <span class="material-symbols-outlined">mail</span> Inbox
                <span class="badge" id="inbox-badge" {% if not unorganized_inbox_count or unorganized_inbox_count == 0 %}style="display: none;"{% endif %}>{{ unorganized_inbox_count if unorganized_inbox_count else 0 }}</span>
            </button>
        </div>

        <!-- スマホ用メニュー (ヘッダー右上) -->
        <div class="mobile-nav-buttons" id="mobile-nav-buttons">
            <!-- ワンタッチキャプチャ追加 -->
            <button class="btn btn-primary" onclick="openNewCaptureModal()" style="padding: 0.4rem; min-height: 38px; width: 38px;" title="ワンタッチキャプチャ">
                <span class="material-symbols-outlined">edit_document</span>
            </button>
            <!-- ハンバーガー -->
            <button class="btn btn-secondary" onclick="toggleMobileMenu()" style="padding: 0.4rem; min-height: 38px; width: 38px;" title="メニュー">
                <span class="material-symbols-outlined">menu</span>
            </button>
        </div>
    </header>

    <!-- スマホ用スライド式ドロワーメニュー -->
    <div class="mobile-drawer-overlay" id="mobile-drawer-overlay" style="display: none;" onclick="toggleMobileMenu()">
        <div class="mobile-drawer" onclick="event.stopPropagation()">
            <div class="drawer-header">
                <h3>メニュー</h3>
                <button onclick="toggleMobileMenu()" class="btn btn-secondary" style="padding: 0.4rem; min-height: 36px; width: 36px;">
                    <span class="material-symbols-outlined">close</span>
                </button>
            </div>
            <div class="drawer-body">
                <div class="drawer-section">
                    <h4>Google ドライブ連携</h4>
                    {% if google_connected %}
                        <div style="color: var(--color-success); font-weight: 600; margin-bottom: 0.75rem; font-size: 0.9rem; display: flex; align-items: center; gap: 0.25rem;">
                            <span class="material-symbols-outlined">check_circle</span> 連携に成功しています
                        </div>
                        <a href="{{ url_for('google_logout') }}" class="btn btn-danger" style="width: 100%;" onclick="toggleMobileMenu()">連携を切断</a>
                    {% else %}
                        <a href="{{ url_for('google_login') }}" class="btn btn-primary" style="width: 100%; background-color: #4285F4;" onclick="toggleMobileMenu()">連携を開始</a>
                    {% endif %}
                </div>

                <div class="drawer-section">
                    <h4>アプリ管理</h4>
                    <button class="btn btn-secondary drawer-btn" hx-post="{{ url_for('rebuild_cache') }}" hx-target="body" onclick="toggleMobileMenu()">
                        <span class="material-symbols-outlined">sync</span> ドライブから再スキャン
                    </button>
                    <button class="btn btn-secondary drawer-btn" onclick="openGoogleSettingsModal(); toggleMobileMenu();">
                        <span class="material-symbols-outlined">settings</span> 連携フォルダ等の設定
                    </button>
                </div>

                <div class="drawer-section">
                    <h4>メモ管理</h4>
                    <button class="btn btn-secondary drawer-btn" onclick="toggleInbox(); toggleMobileMenu();">
                        <span class="material-symbols-outlined">mail</span> Inbox（未整理メモ）
                        <span class="badge" id="drawer-inbox-badge" {% if not unorganized_inbox_count or unorganized_inbox_count == 0 %}style="display: none;"{% endif %}>{{ unorganized_inbox_count if unorganized_inbox_count else 0 }}</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- スマホ画面右下のワンタッチキャプチャFAB (Floating Action Button) -->
    <button class="mobile-fab-btn" id="mobile-fab" onclick="openNewCaptureModal()" title="ワンタッチキャプチャ">
        <span class="material-symbols-outlined" style="font-size: 1.8rem;">edit_note</span>
    </button>

    {% block content %}{% endblock %}

    <!-- モーダル: 新規キャプチャ (テキスト & 画像添付) -->
    <div class="modal-overlay" id="new-capture-modal" style="display: none; z-index: 300;">
        <div class="modal-content" style="max-width: 480px;">
            <h3 class="modal-title">新規キャプチャ</h3>
            
            <form id="new-capture-form" hx-encoding="multipart/form-data" 
                  hx-post="{{ url_for('new_capture') }}" 
                  hx-target="#inbox-list-container" 
                  hx-on::after-request="closeNewCaptureModal()">
                
                <div style="margin-bottom: 0.75rem;">
                    <label for="capture-title-hint" style="font-size: 0.8rem; font-weight: 600; color: var(--color-text-gray); display: block; margin-bottom: 0.25rem;">
                        見出し（省略時は本文1行目を使用）
                    </label>
                    <input type="text" name="title_hint" class="input-text" id="capture-title-hint" placeholder="例: 気管支炎の処方">
                </div>

                <div style="margin-bottom: 0.75rem;">
                    <label for="capture-text" style="font-size: 0.8rem; font-weight: 600; color: var(--color-text-gray); display: block; margin-bottom: 0.25rem;">
                        本文
                    </label>
                    <textarea name="text" class="edit-textarea" id="capture-text" style="min-height: 120px;" placeholder="メモ内容を入力..."></textarea>
                </div>

                <div style="margin-bottom: 1.25rem;">
                    <label style="font-size: 0.8rem; font-weight: 600; color: var(--color-text-gray); display: block; margin-bottom: 0.35rem;">
                        画像を添付 / 写真を撮影
                    </label>
                    <div style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem;">
                        <!-- 写真ライブラリから選択 -->
                        <label class="btn btn-secondary" style="flex: 1; padding: 0.5rem; font-size: 0.8rem; min-height: 38px; cursor: pointer; text-align: center; display: inline-flex; align-items: center; justify-content: center; gap: 0.25rem; border: 1.5px solid var(--color-border); border-radius: var(--radius-md); background: white;">
                            <span class="material-symbols-outlined" style="font-size: 1.1rem; color: var(--color-primary);">photo_library</span> フォルダから選択
                            <input type="file" name="images" id="capture-images-lib" accept="image/*" multiple style="display: none;" onchange="updateFileLabel(this, 'lib-count-label')">
                        </label>
                        <!-- カメラで撮影 (capture属性) -->
                        <label class="btn btn-secondary" style="flex: 1; padding: 0.5rem; font-size: 0.8rem; min-height: 38px; cursor: pointer; text-align: center; display: inline-flex; align-items: center; justify-content: center; gap: 0.25rem; border: 1.5px solid var(--color-border); border-radius: var(--radius-md); background: white;">
                            <span class="material-symbols-outlined" style="font-size: 1.1rem; color: var(--color-primary);">photo_camera</span> 写真を撮る
                            <input type="file" name="images" id="capture-images-cam" accept="image/*" capture="environment" style="display: none;" onchange="updateFileLabel(this, 'cam-count-label')">
                        </label>
                    </div>
                    <!-- 選択ファイル名のラベル表示 -->
                    <div style="font-size: 0.75rem; color: var(--color-text-gray); display: flex; flex-direction: column; gap: 0.2rem; padding: 0.25rem;">
                        <span id="lib-count-label">📁 フォルダ選択: なし</span>
                        <span id="cam-count-label">📷 撮影画像: なし</span>
                    </div>
                </div>

                <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeNewCaptureModal()">キャンセル</button>
                    <button type="submit" class="btn btn-primary">アップロード</button>
                </div>
            </form>
        </div>
    </div>

    <!-- モーダル: 修正（追記） -->
    <div class="modal-overlay" id="amend-capture-modal" style="display: none; z-index: 300;">
        <div class="modal-content" style="max-width: 450px;">
            <h3 class="modal-title">メモの修正（追記）</h3>
            <form id="amend-capture-form" hx-post="" hx-target="#inbox-list-container" hx-on::after-request="closeAmendCaptureModal()">
                <div style="margin-bottom: 1.25rem;">
                    <label for="amend-text" style="font-size: 0.8rem; font-weight: 600; color: var(--color-text-gray); display: block; margin-bottom: 0.25rem;">
                        追記内容
                    </label>
                    <textarea name="append_text" class="edit-textarea" id="amend-text" required placeholder="追記内容を入力してください..."></textarea>
                </div>
                <div style="display: flex; justify-content: flex-end; gap: 0.5rem;">
                    <button type="button" class="btn btn-secondary" onclick="closeAmendCaptureModal()">キャンセル</button>
                    <button type="submit" class="btn btn-primary">追記</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        function toggleInbox() {
            const panel = document.getElementById('inbox-pane');
            panel.classList.toggle('hidden');
        }

        // モバイル対応: 詳細画面を閉じて一覧に戻る
        function closeDetail() {
            const detailPane = document.getElementById('detail-pane');
            detailPane.classList.remove('active');
        }

        // HTMXで詳細がロードされたときに自動でアクティブ化
        document.body.addEventListener('htmx:afterSwap', function(evt) {
            if (evt.detail.target.id === 'detail-pane') {
                const detailPane = document.getElementById('detail-pane');
                detailPane.classList.add('active');
            }
        });

        // Google 連携設定モーダルの制御
        function openGoogleSettingsModal() {
            const modal = document.getElementById('google-settings-modal');
            if (modal) modal.style.display = 'flex';
        }

        function closeGoogleSettingsModal() {
            const modal = document.getElementById('google-settings-modal');
            if (modal) modal.style.display = 'none';
        }

        // モバイルメニュー（ドロワー）の制御
        function toggleMobileMenu() {
            const overlay = document.getElementById('mobile-drawer-overlay');
            if (overlay) {
                overlay.style.display = overlay.style.display === 'none' ? 'flex' : 'none';
            }
        }

        // キャプチャモーダルの制御
        function openNewCaptureModal() {
            document.getElementById('new-capture-modal').style.display = 'flex';
            document.getElementById('capture-text').focus();
        }

        function closeNewCaptureModal() {
            document.getElementById('new-capture-modal').style.display = 'none';
            document.getElementById('new-capture-form').reset();
            document.getElementById('lib-count-label').textContent = '📁 フォルダ選択: なし';
            document.getElementById('cam-count-label').textContent = '📷 撮影画像: なし';
            refreshInboxBadge();
        }

        function updateFileLabel(input, labelId) {
            const label = document.getElementById(labelId);
            const prefix = labelId === 'lib-count-label' ? '📁 フォルダ選択: ' : '📷 撮影画像: ';
            if (input.files && input.files.length > 0) {
                if (input.files.length === 1) {
                    label.textContent = prefix + input.files[0].name;
                } else {
                    label.textContent = prefix + input.files.length + ' 件の画像を選択中';
                }
                label.style.color = 'var(--color-primary)';
                label.style.fontWeight = '600';
            } else {
                label.textContent = prefix + 'なし';
                label.style.color = 'var(--color-text-gray)';
                label.style.fontWeight = 'normal';
            }
        }

        function openAmendCaptureModal(fileId) {
            const form = document.getElementById('amend-capture-form');
            form.setAttribute('hx-post', '/inbox/' + fileId + '/amend');
            htmx.process(form);
            document.getElementById('amend-capture-modal').style.display = 'flex';
            document.getElementById('amend-text').focus();
        }

        function closeAmendCaptureModal() {
            document.getElementById('amend-capture-modal').style.display = 'none';
            document.getElementById('amend-capture-form').reset();
            refreshInboxBadge();
        }

        function refreshInboxBadge() {
            fetch('/inbox/unorganized-count')
                .then(res => res.json())
                .then(data => {
                    const badge = document.getElementById('inbox-badge');
                    const drawerBadge = document.getElementById('drawer-inbox-badge');
                    if (data.count > 0) {
                        if (badge) badge.textContent = data.count;
                        if (drawerBadge) drawerBadge.textContent = data.count;
                    } else {
                        if (badge) badge.remove();
                        if (drawerBadge) drawerBadge.remove();
                    }
                });
        }
    </script>
</body>
</html>
