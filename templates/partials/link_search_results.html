<div class="link-search-results" style="max-height: 180px; overflow-y: auto; border: 1px solid var(--color-border); border-radius: var(--radius-sm); margin-top: 0.5rem; background: white; box-shadow: var(--shadow-sm);">
    {% if cards %}
        {% for card in cards %}
            <div class="search-result-item" 
                 style="padding: 0.6rem 0.8rem; cursor: pointer; border-bottom: 1px solid var(--color-border); font-size: 0.85rem; color: var(--color-text-dark); transition: background 0.2s;"
                 onclick="insertWikiLink('{{ card.title }}', '{{ card.drive_file_id }}', '{{ index }}')"
                 onmouseover="this.style.backgroundColor='var(--color-bg-light)'"
                 onmouseout="this.style.backgroundColor='transparent'">
                <span class="material-symbols-outlined" style="font-size: 1rem; vertical-align: middle; margin-right: 0.25rem; color: var(--color-primary);">description</span>
                {{ card.title }}
            </div>
        {% endfor %}
    {% else %}
        <div style="padding: 0.75rem; text-align: center; color: var(--color-text-gray); font-size: 0.8rem;">
            該当するノートが見つかりません
        </div>
    {% endif %}
</div>
