{% if captures %}
    {% for cap in captures %}
        <div class="inbox-card {% if cap.organized %}organized{% else %}unorganized{% endif %}" id="inbox-card-{{ cap.drive_file_id }}">
            <div class="inbox-card-meta">
                <span>{{ cap.date_time }}</span>
                <!-- 整理済みトグル (HTMX) -->
                <label style="display: inline-flex; align-items: center; gap: 0.25rem; font-size: 0.8rem; font-weight: 600; cursor: pointer;">
                    <input type="checkbox" {% if cap.organized %}checked{% endif %}
                           hx-post="{{ url_for('toggle_inbox_organized', drive_file_id=cap.drive_file_id) }}"
                           hx-target="#inbox-list-container"
                           style="width: 18px; height: 18px;">
                    整理済
                </label>
            </div>
            
            <div style="font-weight: 600; font-size: 0.95rem; margin-bottom: 0.25rem;">
                {{ cap.title }}
            </div>
            
            <div class="inbox-card-body" id="inbox-body-{{ cap.drive_file_id }}" style="cursor: pointer;" onclick="toggleInboxExpand('{{ cap.drive_file_id }}')">
                <!-- 本文は初期ロード時に非同期で取得、またはあらかじめサーバーサイドで一部分のみ切り出し -->
                <div style="font-size: 0.8rem; color: var(--color-text-gray);">クリックして本文を表示...</div>
            </div>

            <div class="inbox-card-actions">
                <button class="btn btn-secondary" onclick="openEditCaptureModal('{{ cap.drive_file_id }}')" style="padding: 0.25rem 0.6rem; min-height: 32px; font-size: 0.8rem;">
                    <span class="material-symbols-outlined" style="font-size: 1rem;">edit</span> 修正
                </button>
                <!-- Knowledgeに整理する: パラメータ付きでメイン画面（ホーム）へリダイレクトし、対象のInboxメモを開く -->
                <a href="/?organize_inbox_id={{ cap.drive_file_id }}" class="btn btn-primary" style="padding: 0.25rem 0.6rem; min-height: 32px; font-size: 0.8rem; background-color: var(--color-primary);">
                    <span class="material-symbols-outlined" style="font-size: 1rem;">move_to_inbox</span> 整理する
                </a>
            </div>
        </div>
    {% endfor %}
{% else %}
    <div style="padding: 2rem; text-align: center; color: var(--color-text-gray); font-size: 0.9rem;">
        メモはありません
    </div>
{% endif %}

<script>
    function toggleInboxExpand(fileId) {
        const bodyDiv = document.getElementById('inbox-body-' + fileId);
        
        // すでにロード済みの場合はクリックしても閉じない
        if (bodyDiv.getAttribute('data-loaded') === 'true') {
            return;
        }

        // 初回クリック時に非同期で本文をロード
        bodyDiv.innerHTML = '<span class="material-symbols-outlined" style="animation: spin 1s linear infinite;">sync</span> 読み込み中...';
        
        fetch('/inbox/' + fileId + '/content')
            .then(res => res.json())
            .then(data => {
                bodyDiv.setAttribute('data-loaded', 'true');
                bodyDiv.classList.add('expanded');
                bodyDiv.style.maxHeight = 'none';
                bodyDiv.style.cursor = 'default'; // 展開後はクリック無効を示すためにカーソルを戻す
                
                let rawMarkdown = data.content;
                
                // attachment:// 画像リンクを /attachments/ の絶対URLへ変換
                // (marked.js が画像タグとして認識できるようにする)
                const attachmentImgRegex = /!\[\]\(attachment:\/\/(.*?)\)/g;
                let parsedMarkdown = rawMarkdown.replace(attachmentImgRegex, function(match, fileId) {
                    return '![](/attachments/' + fileId + ')';
                });
                
                // marked を用いて Markdown -> HTML レンダリング
                let renderedHtml = "";
                if (typeof marked !== 'undefined') {
                    renderedHtml = marked.parse(parsedMarkdown);
                } else {
                    // フォールバック (HTMLエスケープ + 簡易置換)
                    let esc = rawMarkdown.replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
                    renderedHtml = '<div style="white-space: pre-wrap;">' + esc + '</div>';
                }
                
                // 「簡易表示に戻す」ボタンを末尾に追加
                let closeBtn = '<div style="text-align: right; margin-top: 0.75rem; border-top: 1px dashed var(--color-border); padding-top: 0.5rem;">' +
                               '<button type="button" class="btn btn-secondary" onclick="event.stopPropagation(); collapseInboxCard(\'' + fileId + '\')" style="padding: 0.25rem 0.5rem; min-height: auto; font-size: 0.75rem; display: inline-flex; align-items: center; gap: 0.15rem;">' +
                               '<span class="material-symbols-outlined" style="font-size: 0.95rem;">unfold_less</span> 簡易表示に戻す' +
                               '</button>' +
                               '</div>';

                bodyDiv.innerHTML = '<div class="markdown-body-inbox" style="font-family: inherit;">' + renderedHtml + '</div>' + closeBtn;

                // レンダリングされた img タグ、および a タグに対するイベント制御
                // 1. 画像クリック時に拡大モーダルを起動
                const imgs = bodyDiv.querySelectorAll('img');
                imgs.forEach(img => {
                    img.style.cursor = 'zoom-in';
                    img.style.maxWidth = '100%';
                    img.style.height = 'auto';
                    img.style.borderRadius = 'var(--radius-md)';
                    img.style.border = '1px solid var(--color-border)';
                    img.style.marginTop = '0.5rem';
                    img.style.display = 'block';
                    img.addEventListener('click', function(e) {
                        e.stopPropagation(); // アコーディオン編集・キャンセル等の伝播防止
                        window.open(this.src, '_blank');
                    });
                });

                // 2. リンククリック時の伝播防止 (誤ってアコーディオンが閉じるのを防ぐ)
                const links = bodyDiv.querySelectorAll('a');
                links.forEach(a => {
                    a.addEventListener('click', function(e) {
                        e.stopPropagation();
                    });
                });
            })
            .catch(err => {
                bodyDiv.innerHTML = '<span style="color: var(--color-danger);">読み込みに失敗しました</span>';
            });
    }

    // カードを折りたたむ
    function collapseInboxCard(fileId) {
        const bodyDiv = document.getElementById('inbox-body-' + fileId);
        bodyDiv.removeAttribute('data-loaded');
        bodyDiv.classList.remove('expanded');
        bodyDiv.style.maxHeight = '80px';
        bodyDiv.style.cursor = 'pointer';
        bodyDiv.innerHTML = '<div style="font-size: 0.8rem; color: var(--color-text-gray);">クリックして本文を表示...</div>';
    }
</script>
