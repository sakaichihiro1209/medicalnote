<form class="edit-form"
      hx-post="{{ url_for('save_section', drive_file_id=info.drive_file_id, section_name=sec.name) }}"
      hx-target="#sec-wrapper-{{ index }}"
      hx-swap="innerHTML">
    <h3 class="section-card-title" style="margin: 0;">{{ sec.name }} (編集モード)</h3>
    <textarea name="content" class="edit-textarea" id="textarea-{{ index }}" placeholder="本文を入力してください...">{{ sec.content }}</textarea>
    <input type="hidden" name="index" value="{{ index }}">
    
    <!-- リンク挿入ツール -->
    <div style="margin-top: -0.5rem; margin-bottom: 0.5rem;">
        <button type="button" class="btn btn-secondary" style="font-size: 0.8rem; padding: 0.25rem 0.5rem; display: inline-flex; align-items: center; gap: 0.25rem;" onclick="toggleLinkSearch('{{ index }}')">
            <span class="material-symbols-outlined" style="font-size: 1rem;">link</span> 他のノートへのリンクを挿入
        </button>
        
        <div id="link-search-container-{{ index }}" style="display: none; margin-top: 0.5rem; border: 1px solid var(--color-border); border-radius: var(--radius-md); padding: 0.75rem; background-color: var(--color-bg-light);">
            <div style="font-size: 0.8rem; font-weight: 600; margin-bottom: 0.25rem; color: var(--color-text-dark);">リンクするノートを検索:</div>
            <input type="text" 
                   class="input-text" 
                   placeholder="キーワードを入力..." 
                   style="font-size: 0.85rem; padding: 0.4rem;"
                   hx-get="/api/knowledge/search?index={{ index }}" 
                   hx-trigger="keyup changed delay:300ms" 
                   hx-target="#link-search-results-{{ index }}" 
                   name="q">
            <div id="link-search-results-{{ index }}" style="margin-top: 0.5rem;">
                <!-- 検索結果がここに表示されます -->
            </div>
        </div>
    </div>

    <div class="edit-actions" style="display: flex; width: 100%;">
        <button type="button" class="btn btn-danger" style="margin-right: auto;"
                hx-delete="/knowledge/{{ info.drive_file_id }}/sections/{{ sec.name }}/delete"
                hx-target="#sec-wrapper-{{ index }}"
                hx-swap="outerHTML"
                hx-confirm="このセクション「{{ sec.name }}」を本当に削除しますか？">
            削除
        </button>
        <button type="button" class="btn btn-secondary"
                hx-get="{{ url_for('get_section_card', drive_file_id=info.drive_file_id, section_name=sec.name, index=index) }}"
                hx-target="#sec-wrapper-{{ index }}"
                hx-swap="innerHTML">
            キャンセル
        </button>
        <button type="submit" class="btn btn-primary">保存</button>
    </div>
</form>

<script>
    if (typeof toggleLinkSearch === 'undefined') {
        window.toggleLinkSearch = function(index) {
            const container = document.getElementById('link-search-container-' + index);
            if (container.style.display === 'none') {
                container.style.display = 'block';
                container.querySelector('input[type="text"]').focus();
            } else {
                container.style.display = 'none';
            }
        };
    }
    if (typeof insertWikiLink === 'undefined') {
        window.insertWikiLink = function(title, fileId, index) {
            const textarea = document.getElementById('textarea-' + index);
            if (!textarea) return;
            
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;
            const oldText = textarea.value;
            const linkText = '[' + title + '](wiki://' + fileId + ')';
            
            textarea.value = oldText.substring(0, start) + linkText + oldText.substring(end);
            textarea.focus();
            textarea.selectionStart = textarea.selectionEnd = start + linkText.length;
            
            // 検索コンテナを閉じる
            document.getElementById('link-search-container-' + index).style.display = 'none';
        };
    }
</script>
